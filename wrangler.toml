name = "daisy-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Uncomment and configure for your domain:
# routes = [
#   { pattern = "daisy.yourdomain.com/*", zone_name = "yourdomain.com" },
#   { pattern = "photos.yourdomain.com/*", zone_name = "yourdomain.com" },
# ]

[assets]
directory = "dist/web"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[vars]
FRONTEND_URL = "https://daisy.yourdomain.com"
DEFAULT_ALBUM_SLUG = ""

# ADMIN_USERS, JWT_SECRET, and DEFAULT_ALBUM_SLUG are set via `wrangler secret put` for production.
# For local dev, these are loaded from .dev.vars automatically.

[[d1_databases]]
binding = "DB"
database_name = "daisy"
database_id = "YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "daisy-photos"
